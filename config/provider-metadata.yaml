                }
        argumentDocs:
            auto_indexing: '- (Deprecated, Optional) Flag that indicates whether the serverless instance uses Serverless Auto Indexing. This parameter defaults to true.'
            connection_strings_private_endpoint_srv: '- List of Serverless Private Endpoint Connections'
            connection_strings_standard_srv: '- Public mongodb+srv:// connection string that you can use to connect to this serverless instance.'
            continuous_backup_enabled: '- (Deprecated, Optional) Flag that indicates whether the serverless instance uses Serverless Continuous Backup. If this parameter is false or not used, the serverless instance uses Basic Backup.'
            create_date: '- Timestamp that indicates when MongoDB Cloud created the serverless instance. The timestamp displays in the ISO 8601 date and time format in UTC.'
            id: '- Unique 24-hexadecimal digit string that identifies the serverless instance.'
            key: '- (Required) Constant that defines the set of the tag.'
            mongo_db_version: '- Version of MongoDB that the serverless instance runs, in <major version>.<minor version> format.'
            name: '- (Required) Human-readable label that identifies the serverless instance.'
            project_id: '- (Required) The ID of the organization or project you want to create the serverless instance within.'
            provider_settings_backing_provider_name: '- (Required) Cloud service provider on which MongoDB Cloud provisioned the serverless instance.'
            provider_settings_provider_name: '- (Required) Cloud service provider that applies to the provisioned the serverless instance.'
            provider_settings_region_name: |-
                - (Required)
                Human-readable label that identifies the physical location of your MongoDB serverless instance. The region you choose can affect network latency for clients accessing your databases.
            state_name: '- Stage of deployment of this serverless instance when the resource made its request.'
            tags: '- (Optional) Set that contains key-value pairs between 1 to 255 characters in length for tagging and categorizing the cluster. See below.'
            termination_protection_enabled: '- Flag that indicates whether termination protection is enabled on the cluster. If set to true, MongoDB Cloud won''t delete the cluster. If set to false, MongoDB Cloud will delete the cluster.'
            value: '- (Required) Variable that belongs to the set of the tag.'
        importStatements: []
    mongodbatlas_service_account:
        subCategory: Service Accounts
        name: mongodbatlas_service_account
        title: ""
        examples:
            - name: this
              manifest: |-
                {
                  "description": "Example Service Account",
                  "name": "example-service-account",
                  "org_id": "${var.org_id}",
                  "roles": [
                    "ORG_READ_ONLY"
                  ],
                  "secret_expires_after_hours": 2160
                }
              references:
                org_id: var.org_id
        argumentDocs:
            client_id: (String) The Client ID of the Service Account.
            created_at: (String) The date that the Service Account was created on. This parameter expresses its value in the ISO 8601 timestamp format in UTC.
            description: (String) Human readable description for the Service Account.
            expires_at: (String) The date for the expiration of the secret. This parameter expresses its value in the ISO 8601 timestamp format in UTC.
            last_used_at: (String) The last time the secret was used. This parameter expresses its value in the ISO 8601 timestamp format in UTC.
            masked_secret_value: (String) The masked Service Account secret.
            name: (String) Human-readable name for the Service Account. The name is modifiable and does not have to be unique.
            org_id: (String) Unique 24-hexadecimal digit string that identifies the organization that contains your projects.
            roles: (Set of String) A list of organization-level roles for the Service Account.
            secret: (String, Sensitive) The secret for the Service Account. It will be returned only the first time after creation.
            secret_expires_after_hours: (Number) The expiration time of the new Service Account secret, provided in hours. The minimum and maximum allowed expiration times are subject to change and are controlled by the organization's settings. This attribute is required when creating the Service Account and you cannot update it later.
            secret_id: (String) Unique 24-hexadecimal digit string that identifies the secret.
            secrets: (Attributes List) A list of secrets associated with the specified Service Account. (see below for nested schema)
        importStatements: []
    mongodbatlas_service_account_access_list_entry:
        subCategory: Service Accounts
        name: mongodbatlas_service_account_access_list_entry
        title: ""
        examples:
            - name: cidr
              manifest: |-
                {
                  "cidr_block": "1.2.3.4/32",
                  "client_id": "${mongodbatlas_service_account.this.client_id}",
                  "org_id": "${var.org_id}"
                }
              references:
                client_id: mongodbatlas_service_account.this.client_id
                org_id: var.org_id
              dependencies:
                mongodbatlas_service_account.this: |-
                    {
                      "description": "Example Service Account",
                      "name": "example-service-account",
                      "org_id": "${var.org_id}",
                      "roles": [
                        "ORG_READ_ONLY"
                      ],
                      "secret_expires_after_hours": 2160
                    }
            - name: ip
              manifest: |-
                {
                  "client_id": "${mongodbatlas_service_account.this.client_id}",
                  "ip_address": "2.3.4.5",
                  "org_id": "${var.org_id}"
                }
              references:
                client_id: mongodbatlas_service_account.this.client_id
                org_id: var.org_id
              dependencies:
                mongodbatlas_service_account.this: |-
                    {
                      "description": "Example Service Account",
                      "name": "example-service-account",
                      "org_id": "${var.org_id}",
                      "roles": [
                        "ORG_READ_ONLY"
                      ],
                      "secret_expires_after_hours": 2160
                    }
        argumentDocs:
            cidr_block: (String) Range of IP addresses in CIDR notation to be added to the access list. You can set a value for this parameter or ip_address, but not for both.
            client_id: (String) The Client ID of the Service Account.
            created_at: (String) Date the entry was added to the access list. This attribute expresses its value in the ISO 8601 timestamp format in UTC.
            ip_address: (String) IP address to be added to the access list. You can set a value for this parameter or cidr_block, but not for both.
            last_used_address: (String) Network address that issued the most recent request to the API.
            last_used_at: (String) Date when the API received the most recent request that originated from this network address.
            org_id: (String) Unique 24-hexadecimal digit string that identifies the organization that contains your projects.
            request_count: (Number) The number of requests that has originated from this network address.
        importStatements: []
