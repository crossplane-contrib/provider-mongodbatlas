    mongodbatlas_stream_privatelink_endpoint:
        subCategory: Streams
        name: mongodbatlas_stream_privatelink_endpoint
        title: ""
        examples:
            - name: test
              manifest: |-
                {
                  "dns_domain": "${confluent_network.private_link.dns_domain}",
                  "dns_sub_domain": "${confluent_network.private_link.zonal_subdomains}",
                  "project_id": "${var.project_id}",
                  "provider_name": "AWS",
                  "region": "${var.aws_region}",
                  "service_endpoint_id": "${confluent_network.private_link.aws[0].private_link_endpoint_service}",
                  "vendor": "CONFLUENT"
                }
              references:
                dns_domain: confluent_network.private_link.dns_domain
                dns_sub_domain: confluent_network.private_link.zonal_subdomains
                project_id: var.project_id
                region: var.aws_region
                service_endpoint_id: confluent_network.private_link.aws[0].private_link_endpoint_service
              dependencies:
                confluent_environment.staging: |-
                    {
                      "display_name": "Staging"
                    }
                confluent_kafka_cluster.dedicated: |-
                    {
                      "availability": "MULTI_ZONE",
                      "cloud": "${confluent_network.private_link.cloud}",
                      "dedicated": [
                        {
                          "cku": 2
                        }
                      ],
                      "display_name": "example-dedicated-cluster",
                      "environment": [
                        {
                          "id": "${confluent_environment.staging.id}"
                        }
                      ],
                      "network": [
                        {
                          "id": "${confluent_network.private_link.id}"
                        }
                      ],
                      "region": "${confluent_network.private_link.region}"
                    }
                confluent_network.private_link: |-
                    {
                      "cloud": "AWS",
                      "connection_types": [
                        "PRIVATELINK"
                      ],
                      "display_name": "terraform-test-private-link-network-manual",
                      "dns_config": [
                        {
                          "resolution": "PRIVATE"
                        }
                      ],
                      "environment": [
                        {
                          "id": "${confluent_environment.staging.id}"
                        }
                      ],
                      "region": "${var.aws_region}",
                      "zones": "${keys(var.subnets_to_privatelink)}"
                    }
                confluent_private_link_access.aws: |-
                    {
                      "aws": [
                        {
                          "account": "${var.aws_account_id}"
                        }
                      ],
                      "display_name": "example-private-link-access",
                      "environment": [
                        {
                          "id": "${confluent_environment.staging.id}"
                        }
                      ],
                      "network": [
                        {
                          "id": "${confluent_network.private_link.id}"
                        }
                      ]
                    }
            - name: test
              manifest: |-
                {
                  "arn": "${aws_msk_cluster.example.arn}",
                  "project_id": "${var.project_id}",
                  "provider_name": "AWS",
                  "vendor": "MSK"
                }
              references:
                arn: aws_msk_cluster.example.arn
                project_id: var.project_id
              dependencies:
                aws_msk_cluster.example: |-
                    {
                      "broker_node_group_info": [
                        {
                          "client_subnets": [
                            "${aws_subnet.subnet_az1.id}",
                            "${aws_subnet.subnet_az2.id}"
                          ],
                          "connectivity_info": [
                            {
                              "vpc_connectivity": [
                                {
                                  "client_authentication": [
                                    {
                                      "sasl": [
                                        {
                                          "scram": true
                                        }
                                      ]
                                    }
                                  ]
                                }
                              ]
                            }
                          ],
                          "instance_type": "kafka.m5.large",
                          "security_groups": [
                            "${aws_security_group.sg.id}"
                          ]
                        }
                      ],
                      "client_authentication": [
                        {
                          "sasl": [
                            {
                              "scram": true
                            }
                          ]
                        }
                      ],
                      "cluster_name": "${var.msk_cluster_name}",
                      "configuration_info": [
                        {
                          "arn": "${aws_msk_configuration.example.arn}",
                          "revision": "${aws_msk_configuration.example.latest_revision}"
                        }
                      ],
                      "kafka_version": "3.6.0",
                      "number_of_broker_nodes": 2
                    }
                aws_msk_cluster_policy.example: |-
                    {
                      "cluster_arn": "${aws_msk_cluster.example.arn}",
                      "policy": "${jsonencode({\n    Version = \"2012-10-17\",\n    Statement = [{\n      Effect = \"Allow\"\n      Principal = {\n        \"AWS\" = \"arn:aws:iam::${var.aws_account_id}:root\"\n      }\n      Action = [\n        \"kafka:CreateVpcConnection\",\n        \"kafka:GetBootstrapBrokers\",\n        \"kafka:DescribeCluster\",\n        \"kafka:DescribeClusterV2\"\n      ]\n      Resource = aws_msk_cluster.example.arn\n    }]\n  })}"
                    }
                aws_msk_configuration.example: |-
                    {
                      "name": "${var.msk_cluster_name}-msk-configuration",
                      "server_properties": "auto.create.topics.enable=false\ndefault.replication.factor=3\nmin.insync.replicas=2\nnum.io.threads=8\nnum.network.threads=5\nnum.partitions=1\nnum.replica.fetchers=2\nreplica.lag.time.max.ms=30000\nsocket.receive.buffer.bytes=102400\nsocket.request.max.bytes=104857600\nsocket.send.buffer.bytes=102400\nunclean.leader.election.enable=true\nallow.everyone.if.no.acl.found=false\n"
                    }
                aws_msk_single_scram_secret_association.example: |-
                    {
                      "cluster_arn": "${aws_msk_cluster.example.arn}",
                      "secret_arn": "${var.aws_secret_arn}"
                    }
                aws_security_group.sg: |-
                    {
                      "vpc_id": "${aws_vpc.vpc.id}"
                    }
                aws_subnet.subnet_az1: |-
                    {
                      "availability_zone": "${data.aws_availability_zones.azs.names[0]}",
                      "cidr_block": "192.168.0.0/24",
                      "vpc_id": "${aws_vpc.vpc.id}"
                    }
                aws_subnet.subnet_az2: |-
                    {
                      "availability_zone": "${data.aws_availability_zones.azs.names[1]}",
                      "cidr_block": "192.168.1.0/24",
                      "vpc_id": "${aws_vpc.vpc.id}"
                    }
                aws_vpc.vpc: |-
                    {
                      "cidr_block": "192.168.0.0/22"
                    }
            - name: this
              manifest: |-
                {
                  "project_id": "${var.project_id}",
                  "provider_name": "AWS",
                  "region": "${var.region}",
                  "service_endpoint_id": "${var.service_endpoint_id}",
                  "vendor": "S3"
                }
              references:
                project_id: var.project_id
                region: var.region
                service_endpoint_id: var.service_endpoint_id
              dependencies:
                aws_s3_bucket.stream_bucket: |-
                    {
                      "bucket": "${var.s3_bucket_name}",
                      "force_destroy": true,
                      "provider": "${aws.s3_region}"
                    }
                aws_s3_bucket_server_side_encryption_configuration.stream_bucket_encryption: |-
                    {
                      "bucket": "${aws_s3_bucket.stream_bucket.id}",
                      "provider": "${aws.s3_region}",
                      "rule": [
                        {
                          "apply_server_side_encryption_by_default": [
                            {
                              "sse_algorithm": "AES256"
                            }
                          ]
                        }
                      ]
                    }
                aws_s3_bucket_versioning.stream_bucket_versioning: |-
                    {
                      "bucket": "${aws_s3_bucket.stream_bucket.id}",
                      "provider": "${aws.s3_region}",
                      "versioning_configuration": [
                        {
                          "status": "Enabled"
                        }
                      ]
                    }
            - name: gcp_confluent
              manifest: |-
                {
                  "dns_domain": "${var.confluent_dns_domain}",
                  "dns_sub_domain": "${var.confluent_dns_subdomains}",
                  "project_id": "${var.project_id}",
                  "provider_name": "GCP",
                  "region": "${var.gcp_region}",
                  "service_attachment_uris": [
                    "projects/my-project/regions/us-west1/serviceAttachments/confluent-attachment-1",
                    "projects/my-project/regions/us-west1/serviceAttachments/confluent-attachment-2"
                  ],
                  "vendor": "CONFLUENT"
                }
              references:
                dns_domain: var.confluent_dns_domain
                dns_sub_domain: var.confluent_dns_subdomains
                project_id: var.project_id
                region: var.gcp_region
        argumentDocs:
            arn: (String) Amazon Resource Name (ARN). Required for AWS Provider and MSK vendor.
            dns_domain: '(String) The domain hostname. Required for the following provider and vendor combinations:'
            dns_sub_domain: (List of String) Sub-Domain name of Confluent cluster. These are typically your availability zones. Required for AWS Provider and CONFLUENT vendor. If your AWS CONFLUENT cluster doesn't use subdomains, you must set this to the empty array [].
            error_message: (String) Error message if the connection is in a failed state.
            id: (String) The ID of the Private Link connection.
            interface_endpoint_id: (String) Interface endpoint ID that is created from the specified service endpoint ID.
            interface_endpoint_name: (String) Name of interface endpoint that is created from the specified service endpoint ID.
            project_id: '(String) Unique 24-hexadecimal digit string that identifies your project. Use the /groups endpoint to retrieve all projects to which the authenticated user has access.NOTE: Groups and projects are synonymous terms. Your group id is the same as your project id. For existing groups, your group or project id remains the same. The resource and corresponding endpoints use the term groups.'
            provider_account_id: (String) Account ID from the cloud provider.
            provider_name: (String) Provider where the endpoint is deployed. Valid values are AWS, AZURE, and GCP.
            region: (String) The region of the Provider’s cluster. See AZURE and AWS supported regions. When the vendor is CONFLUENT, this is the domain name of Confluent cluster. When the vendor is MSK, this is computed by the API from the provided arn.
            service_attachment_uris: (List of String) List of GCP service attachment URIs for Confluent vendor. Required for GCP provider with CONFLUENT vendor.
            service_endpoint_id: (String) For AZURE EVENTHUB, this is the namespace endpoint ID. For AWS CONFLUENT cluster, this is the VPC Endpoint service name.
            state: (String) Status of the connection.
            vendor: '(String) Vendor that manages the endpoint. The following are the vendor values per provider:'
        importStatements: []
