                      "project_id": "\u003cYOUR-PROJECT-ID\u003e",
                      "replication_specs": [
                        {
                          "region_configs": [
                            {
                              "electable_specs": {
                                "instance_size": "M30",
                                "node_count": 3
                              },
                              "priority": 7,
                              "provider_name": "AWS",
                              "region_name": "EU_CENTRAL_1"
                            }
                          ],
                          "zone_name": "Zone 1"
                        },
                        {
                          "region_configs": [
                            {
                              "electable_specs": {
                                "instance_size": "M30",
