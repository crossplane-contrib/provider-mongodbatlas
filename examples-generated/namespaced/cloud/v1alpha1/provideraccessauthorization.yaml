apiVersion: cloud.mongodbatlas.m.crossplane.io/v1alpha1
kind: ProviderAccessAuthorization
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/provideraccessauthorization
  labels:
    testing.upbound.io/example-name: auth_role
  name: auth-role
  namespace: crossplane-system
spec:
  forProvider:
    aws:
    - iamAssumedRoleArn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/test-user-role
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: setup_only
    roleIdSelector:
      matchLabels:
        testing.upbound.io/example-name: setup_only

---

apiVersion: cloud.mongodbatlas.m.crossplane.io/v1alpha1
kind: ProviderAccessSetup
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/provideraccessauthorization
  labels:
    testing.upbound.io/example-name: setup_only
  name: setup-only
  namespace: crossplane-system
spec:
  forProvider:
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    providerName: AWS
