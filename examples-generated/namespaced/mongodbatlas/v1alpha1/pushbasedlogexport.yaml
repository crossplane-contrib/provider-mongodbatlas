apiVersion: mongodbatlas.m.crossplane.io/v1alpha1
kind: PushBasedLogExport
metadata:
  annotations:
    meta.upbound.io/example-id: mongodbatlas/v1alpha1/pushbasedlogexport
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: crossplane-system
spec:
  forProvider:
    bucketName: ${aws_s3_bucket.log_bucket.bucket}
    iamRoleId: ${mongodbatlas_cloud_provider_access_authorization.auth_role.role_id}
    prefixPath: push-based-log-test
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: project-tf

---

apiVersion: cloud.mongodbatlas.m.crossplane.io/v1alpha1
kind: ProviderAccessAuthorization
metadata:
  annotations:
    meta.upbound.io/example-id: /v1alpha1/pushbasedlogexport
  labels:
    testing.upbound.io/example-name: auth_role
  name: auth-role
  namespace: crossplane-system
spec:
  forProvider:
    aws:
    - iamAssumedRoleArn: ${aws_iam_role.test_role.arn}
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: project-tf
    roleId: ${mongodbatlas_cloud_provider_access_setup.setup_only.role_id}

---

apiVersion: cloud.mongodbatlas.m.crossplane.io/v1alpha1
kind: ProviderAccessSetup
metadata:
  annotations:
    meta.upbound.io/example-id: /v1alpha1/pushbasedlogexport
  labels:
    testing.upbound.io/example-name: setup_only
  name: setup-only
  namespace: crossplane-system
spec:
  forProvider:
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: project-tf
    providerName: AWS

---

apiVersion: mongodbatlas.m.crossplane.io/v1alpha1
kind: Project
metadata:
  annotations:
    meta.upbound.io/example-id: /v1alpha1/pushbasedlogexport
  labels:
    testing.upbound.io/example-name: project-tf
  name: project-tf
  namespace: crossplane-system
spec:
  forProvider:
    name: ${var.atlas_project_name}
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
