apiVersion: cloud.mongodbatlas.crossplane.io/v1alpha1
kind: BackupSnapshot
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/backupsnapshot
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    clusterName: NAME OF CLUSTER
    description: myDescription
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: my_cluster
    retentionInDays: 1
    timeouts:
    - create: 1h15m

---

apiVersion: mongodbatlas.crossplane.io/v1alpha3
kind: AdvancedCluster
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/backupsnapshot
  labels:
    testing.upbound.io/example-name: my_cluster
  name: my-cluster
spec:
  forProvider:
    backupEnabled: true
    clusterType: REPLICASET
    name: MyCluster
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    replicationSpecs:
    - regionConfigs:
      - electableSpecs:
          instanceSize: M10
          nodeCount: 3
        priority: 7
        providerName: AWS
        regionName: EU_WEST_2

---

apiVersion: cloud.mongodbatlas.crossplane.io/v1alpha1
kind: BackupSnapshotRestoreJob
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/backupsnapshot
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    clusterName: MyCluster
    deliveryTypeConfig:
    - download: true
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    snapshotIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
