apiVersion: privateendpoint.mongodbatlas.crossplane.io/v1alpha1
kind: Service
metadata:
  annotations:
    meta.upbound.io/example-id: privateendpoint/v1alpha1/service
  labels:
    testing.upbound.io/example-name: this
  name: this
spec:
  forProvider:
    endpointServiceId: ${aws_vpc_endpoint.ptfe_service.id}
    privateLinkIdSelector:
      matchLabels:
        testing.upbound.io/example-name: this
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: this
    providerName: AWS

---

apiVersion: privateendpoint.mongodbatlas.crossplane.io/v1alpha1
kind: Resource
metadata:
  annotations:
    meta.upbound.io/example-id: privateendpoint/v1alpha1/service
  labels:
    testing.upbound.io/example-name: this
  name: this
spec:
  forProvider:
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    providerName: AWS
    region: US_EAST_1
