apiVersion: cloud.mongodbatlas.m.crossplane.io/v1alpha1
kind: BackupSnapshotExportJob
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/backupsnapshotexportjob
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: crossplane-system
spec:
  forProvider:
    clusterName: '{CLUSTER_NAME}'
    customData:
    - key: exported by
      value: myName
    exportBucketIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    snapshotIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: cloud.mongodbatlas.m.crossplane.io/v1alpha1
kind: BackupSnapshotExportBucket
metadata:
  annotations:
    meta.upbound.io/example-id: cloud/v1alpha1/backupsnapshotexportjob
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: crossplane-system
spec:
  forProvider:
    bucketName: example_bucket
    cloudProvider: AWS
    iamRoleId: '{IAM_ROLE_ID}'
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
