            x-kubernetes-validations:
            - message: spec.forProvider.authenticationEnabled is a required parameter
              rule: '!(''*'' in self.managementPolicies || ''Create'' in self.managementPolicies
                || ''Update'' in self.managementPolicies) || has(self.forProvider.authenticationEnabled)
                || (has(self.initProvider) && has(self.initProvider.authenticationEnabled))'
            - message: spec.forProvider.bindPasswordSecretRef is a required parameter
              rule: '!(''*'' in self.managementPolicies || ''Create'' in self.managementPolicies
