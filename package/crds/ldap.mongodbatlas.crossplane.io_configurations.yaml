                  authorizationEnabled:
                    description: Specifies whether user authorization with LDAP is
                      enabled. You cannot enable user authorization with LDAP without
                      first enabling user authentication with LDAP.
                    type: boolean
                  authzQueryTemplate:
                    description: 'An LDAP query template that Atlas executes to obtain
                      the LDAP groups to which the authenticated user belongs. Used
                      only for user authorization. Use the {USER} placeholder in the
                      URL to substitute the authenticated username. The query is relative
                      to the host specified with hostname. The formatting for the
                      query must conform to RFC4515 and RFC 4516. If you do not provide
                      a query template, Atlas attempts to use the default value: {USER}?memberOf?base.'
                    type: string
