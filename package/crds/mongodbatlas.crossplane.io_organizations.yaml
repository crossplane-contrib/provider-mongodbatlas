                  multiFactorAuthRequired:
                    description: 'Flag that indicates whether to require users to
                      set up Multi-Factor Authentication (MFA) before accessing the
                      specified organization. To learn more, see: https://www.mongodb.com/docs/atlas/security-multi-factor-authentication/.'
                    type: boolean
                  name:
                    description: The name of the organization.
                    type: string
                  orgOwnerId:
                    description: Unique 24-hexadecimal digit string that identifies
                      the Atlas user that you want to assign the Organization Owner
                      role. This user must be a member of the same organization as
                      the calling API key.  This is only required when authenticating
                      with Programmatic API Keys. MongoDB Atlas Admin API - Get User
                      By Username. This attribute is required in creation and can't
                      be updated later.
                    type: string
                  restrictEmployeeAccess:
                    description: 'Flag that indicates whether to block MongoDB Support
                      from accessing Atlas infrastructure for any deployment in the
                      specified organization without explicit permission. Once this
                      setting is turned on, you can grant MongoDB Support a 24-hour
                      bypass access to the Atlas deployment to resolve support issues.
                      To learn more, see: https://www.mongodb.com/docs/atlas/security-restrict-support-access/.'
                    type: boolean
                  roleNames:
                    description: List of Organization roles that the Programmatic
                      API key needs to have. Ensure that you provide at least one
                      role and ensure all roles are valid for the Organization.  You
                      must specify an array even if you are only associating a single
                      role with the Programmatic API key. The MongoDB Documentation
                      describes the roles that you can assign to a Programmatic API
                      key. This attribute is required in creation and can't be updated
                      later.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  securityContact:
                    description: String that specifies a single email address for
                      the specified organization to receive security-related notifications.
                      Specifying a security contact does not grant them authorization
                      or access to Atlas for security decisions or approvals.
                    type: string
                  serviceAccount:
                    description: Block to create a Service Account instead of a Programmatic
                      API Key when creating the organization. The API does not allow
                      creating both in the same request. Mutually exclusive with description
                      and role_names. This block can't be updated after creation.
                      See Service Account.
                    items:
