                      and role_names. This block can't be updated after creation.
                      See Service Account.
                    items:
                      properties:
                        clientId:
                          description: level credentials for subsequent operations.
                          type: string
                        createdAt:
                          description: The date that the Service Account was created
                            on. This parameter expresses its value in the ISO 8601
                            timestamp format in UTC.
                          type: string
                        description:
                          description: Programmatic API Key description. This attribute
