                            Service Account.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: set
                        secretExpiresAfterHours:
                          description: The expiration time of the new Service Account
                            secret, provided in hours. The minimum and maximum allowed
                            expiration times are subject to change and are controlled
                            by the organization's settings.
                          type: number
                        secrets:
                          description: A list of secrets associated with the specified
                            Service Account. See Secrets.
                          items:
                            properties:
                              createdAt:
                                description: The date that the Service Account was
                                  created on. This parameter expresses its value in
                                  the ISO 8601 timestamp format in UTC.
                                type: string
                              expiresAt:
                                description: The date for the expiration of the secret.
                                  This parameter expresses its value in the ISO 8601
                                  timestamp format in UTC.
                                type: string
                              secret:
                                description: (Sensitive) The secret for the Service
                                  Account. It will be returned only the first time
