              rule: '!(''*'' in self.managementPolicies || ''Create'' in self.managementPolicies
                || ''Update'' in self.managementPolicies) || has(self.forProvider.name)
                || (has(self.initProvider) && has(self.initProvider.name))'
          status:
            description: OrganizationStatus defines the observed state of Organization.
            properties:
              atProvider:
                properties:
                  apiAccessListRequired:
                    description: Flag that indicates whether to require API operations
                      to originate from an IP Address added to the API access list
                      for the specified organization.
                    type: boolean
                  description:
                    description: Programmatic API Key description. This attribute
