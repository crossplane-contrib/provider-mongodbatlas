                      for the specified organization.
                    type: boolean
                  description:
                    description: Programmatic API Key description. This attribute
                      is required in creation and can't be updated later.
                    type: string
                  federationSettingsId:
                    description: Unique 24-hexadecimal digit string that identifies
                      the federation to link the newly created organization to. If
                      specified, the proposed Organization Owner of the new organization
                      must have the Organization Owner role in an organization associated
                      with the federation. This attribute can't be updated after creation.
                    type: string
                  genAiFeaturesEnabled:
                    description: Flag that indicates whether this organization has
                      access to generative AI features. This setting only applies
                      to Atlas Commercial and defaults to true. With this setting
