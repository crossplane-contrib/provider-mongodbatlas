                    type: object
                  redactClientLogData:
                    description: |-
                      Flag that enables or disables log redaction, see the manual for more information. Use this in conjunction with Encryption at Rest and TLS/SSL (Transport Encryption) to assist compliance with regulatory requirements. Note: Changing this setting on a cluster will trigger a rolling restart as soon as the cluster is updated.
                      Enable or disable log redaction.

                      This setting configures the “mongod“ or “mongos“ to redact any document field contents from a message accompanying a given log event before logging. This prevents the program from writing potentially sensitive data stored on the database to the diagnostic log. Metadata such as error or operation codes, line numbers, and source file names are still visible in the logs.

                      Use “redactClientLogData“ in conjunction with Encryption at Rest and TLS/SSL (Transport Encryption) to assist compliance with regulatory requirements.

                      *Note*: changing this setting on a cluster will trigger a rolling restart as soon as the cluster is updated.
                    type: boolean
                  replicaSetScalingStrategy:
                    description: |-
                      Replica set scaling mode for your cluster. Valid values are WORKLOAD_TYPE, SEQUENTIAL and NODE_TYPE. By default, Atlas scales under WORKLOAD_TYPE. This mode allows Atlas to scale your analytics nodes in parallel to your operational nodes. When configured as SEQUENTIAL, Atlas scales all nodes sequentially. This mode is intended for steady-state workloads and applications performing latency-sensitive secondary reads. When configured as NODE_TYPE, Atlas scales your electable nodes in parallel with your read-only and analytics nodes. This mode is intended for large, dynamic workloads requiring frequent and timely cluster tier scaling. This is the fastest scaling strategy, but it might impact latency of workloads when performing extensive secondary reads. Modify the Replica Set Scaling Mode
                      Set this field to configure the replica set scaling mode for your cluster.

                      By default, Atlas scales under WORKLOAD_TYPE. This mode allows Atlas to scale your analytics nodes in parallel to your operational nodes.

                      When configured as SEQUENTIAL, Atlas scales all nodes sequentially. This mode is intended for steady-state workloads and applications performing latency-sensitive secondary reads.

                      When configured as NODE_TYPE, Atlas scales your electable nodes in parallel with your read-only and analytics nodes. This mode is intended for large, dynamic workloads requiring frequent and timely cluster tier scaling. This is the fastest scaling strategy, but it might impact latency of workloads when performing extensive secondary reads.
                    type: string
                  replicationSpecs:
                    description: List of settings that configure your cluster regions.
                      This attribute has one object per shard representing node configurations
                      in each shard. For replica sets there is only one object representing
                      node configurations. The replication_specs configuration for
                      all shards within the same zone must be the same, with the exception
                      of instance_size and disk_iops that can scale independently.
                      Note that independent disk_iops values are only supported for
                      AWS provisioned IOPS, or Azure regions that support Extended
                      IOPS. See below.
                    items:
                      properties:
                        regionConfigs:
                          description: Configuration for the hardware specifications
                            for nodes set for a given region. Each region_configs
                            object describes the region's priority in elections and
                            the number and type of MongoDB nodes that Atlas deploys
                            to the region. Each region_configs object must have either
                            an analytics_specs object, electable_specs object, or
                            read_only_specs object. See below.
                          items:
                            properties:
                              analyticsAutoScaling:
                                description: Configuration for the Collection of settings
                                  that configures analytics-auto-scaling information
                                  for the cluster. The values for the analytics_auto_scaling
                                  attribute must be the same for all region_configs
                                  of a cluster. See below.
                                properties:
                                  computeEnabled:
                                    description: |-
                                      Flag that indicates whether analytics instance size auto-scaling is enabled. This parameter defaults to false. If a sharded cluster is making use of the New Sharding Configuration, auto-scaling of analytics instance size will be independent for each individual shard. Please reference the Use Auto-Scaling Per Shard section for more details.
                                      Flag that indicates whether someone enabled instance size auto-scaling.

                                      - Set to `true` to enable instance size auto-scaling. If enabled, you must specify a value for **replicationSpecs[n].regionConfigs[m].autoScaling.compute.maxInstanceSize**.
                                      - Set to `false` to disable instance size automatic scaling.
                                    type: boolean
                                  computeMaxInstanceSize:
                                    description: |-
                                      Maximum instance size to which your cluster can automatically scale (such as M40). Atlas requires this parameter if replication_specs[#].region_configs[#].analytics_auto_scaling.compute_enabled is true.
                                      Minimum instance size to which your cluster can automatically scale. MongoDB Cloud requires this parameter if `"replicationSpecs[n].regionConfigs[m].autoScaling.compute.scaleDownEnabled" : true`.
                                    type: string
                                  computeMinInstanceSize:
                                    description: |-
                                      Minimum instance size to which your cluster can automatically scale (such as M10). Atlas requires this parameter if replication_specs[#].region_configs[#].analytics_auto_scaling.compute_scale_down_enabled is true.
                                      Minimum instance size to which your cluster can automatically scale. MongoDB Cloud requires this parameter if `"replicationSpecs[n].regionConfigs[m].autoScaling.compute.scaleDownEnabled" : true`.
                                    type: string
                                  computeScaleDownEnabled:
                                    description: |-
                                      Flag that indicates whether the instance size may scale down. Atlas requires this parameter if replication_specs[#].region_configs[#].analytics_auto_scaling.compute_enabled : true. If you enable this option, specify a value for replication_specs[#].region_configs[#].analytics_auto_scaling.compute_min_instance_size.
                                      Flag that indicates whether the instance size may scale down. MongoDB Cloud requires this parameter if `"replicationSpecs[n].regionConfigs[m].autoScaling.compute.enabled" : true`. If you enable this option, specify a value for **replicationSpecs[n].regionConfigs[m].autoScaling.compute.minInstanceSize**.
                                    type: boolean
                                  diskGbEnabled:
                                    description: |-
                                      Flag that indicates whether this cluster enables disk auto-scaling. The maximum memory allowed for the selected cluster tier and the oplog size can limit storage auto-scaling. This parameter defaults to false.
                                      Flag that indicates whether this cluster enables disk auto-scaling. The maximum memory allowed for the selected cluster tier and the oplog size can limit storage auto-scaling. This parameter defaults to `false`.

                                      To set `disk_gb_enabled` to `false`, Atlas requires **advanced_configuration.oplog_min_retention_hours** to be `0` on the server. If it is still non-zero, the API responds with `OPLOG_MIN_RETENTION_HOURS_NO_DISK_AUTO_SCALING` (HTTP 400).

                                      Cluster updates are applied before process arguments, so setting **advanced_configuration.oplog_min_retention_hours** to `0` in the same `apply` as disabling disk auto-scaling does not prevent the error.

                                      Workaround: Run `apply` twice. First set **advanced_configuration.oplog_min_retention_hours** to `0` and apply. Then set **disk_gb_enabled** to `false` and apply again.
                                    type: boolean
                                type: object
                              analyticsSpecs:
                                description: Hardware specifications for analytics
                                  nodes needed in the region. Analytics nodes handle
                                  analytic data such as reporting queries from BI
                                  Connector for Atlas. Analytics nodes are read-only
                                  and can never become the primary. If you don't specify
                                  this parameter, no analytics nodes deploy to this
                                  region. See below.
                                properties:
                                  diskIops:
                                    description: |-
                                      Target IOPS (Input/Output Operations Per Second) desired for storage attached to this hardware. Define this attribute only if you selected AWS as your cloud service provider, instance_size is set to "M30" or greater (not including "Mxx_NVME" tiers), and ebs_volume_type is "PROVISIONED". You can't set this attribute for a multi-cloud cluster.
                                      Target throughput desired for storage attached to your Azure-provisioned cluster. Change this parameter if you:

                                      - set `"replicationSpecs[n].regionConfigs[m].providerName" : "Azure"`.
                                      - set `"replicationSpecs[n].regionConfigs[m].electableSpecs.instanceSize" : "M40"` or greater not including `Mxx_NVME` tiers.

                                      The maximum input/output operations per second (IOPS) depend on the selected **.instanceSize** and **.diskSizeGB**.
                                      This parameter defaults to the cluster tier's standard IOPS value.
                                      Changing this value impacts cluster cost.
                                    type: number
