                        type: string
                      noTableScan:
                        description: |-
                          When true, the cluster disables the execution of any query that requires a collection scan to return results. When false, the cluster allows the execution of those operations.
                          Flag that indicates whether the cluster disables executing any query that requires a collection scan to return results.
                        type: boolean
                      oplogMinRetentionHours:
                        description: |-
                          scaling does not prevent the error.
                          Minimum retention window for cluster's oplog expressed in hours. Once this attribute has been set to a non-null value, removing it from your configuration or setting it to `null` will retain the last applied value rather than reverting to the default value. To disable this setting, check the [MongoDB documentation](https://www.mongodb.com/docs/manual/reference/configuration-options/#mongodb-setting-storage.oplogMinRetentionHours) for the specific value to use (currently `0`).
                        type: number
                      oplogSizeMb:
                        description: |-
                          The custom oplog size of the cluster. Without a value that indicates that the cluster uses the default oplog size calculated by Atlas.
                          Storage limit of cluster's oplog expressed in megabytes. A value of null indicates that the cluster uses the default oplog size that MongoDB Cloud calculates.
                        type: number
                      sampleRefreshIntervalBiConnector:
                        description: |-
                          Interval in seconds at which the mongosqld process re-samples data to create its relational schema. The default value is 300. The specified value must be a positive integer. Available only for Atlas deployments in which BI Connector for Atlas is enabled.
                          Interval in seconds at which the mongosqld process re-samples data to create its relational schema.
                        type: number
                      sampleSizeBiConnector:
                        description: |-
                          Number of documents per database to sample when gathering schema information. Defaults to 100. Available only for Atlas deployments in which BI Connector for Atlas is enabled.
                          Number of documents per database to sample when gathering schema information.
                        type: number
                      tlsCipherConfigMode:
                        description: |-
                          The TLS cipher suite configuration mode. Valid values include CUSTOM or DEFAULT. The DEFAULT mode uses the default cipher suites. The CUSTOM mode allows you to specify custom cipher suites for both TLS 1.2 and TLS 1.3. To unset, this should be set back to DEFAULT.
                          The TLS cipher suite configuration mode. Valid values include `CUSTOM` or `DEFAULT`. The `DEFAULT` mode uses the default cipher suites. The `CUSTOM` mode allows you to specify custom cipher suites for both TLS 1.2 and TLS 1.3. To unset, this should be set back to `DEFAULT`.
                        type: string
                      transactionLifetimeLimitSeconds:
                        description: |-
                          Lifetime, in seconds, of multi-document transactions. Defaults to 60 seconds.
                          Lifetime, in seconds, of multi-document transactions. Atlas considers the transactions that exceed this limit as expired and so aborts them through a periodic cleanup process.
                        type: number
                    type: object
                  backupEnabled:
                    description: |-
                      Flag that indicates whether the cluster can perform backups.
                      If true, the cluster can perform backups. You must set this value to true for NVMe clusters.
                      Flag that indicates whether the cluster can perform backups. If set to `true`, the cluster can perform backups. You must set this value to `true` for NVMe clusters. Backup uses [Cloud Backups](https://docs.atlas.mongodb.com/backup/cloud-backup/overview/) for dedicated clusters and [Shared Cluster Backups](https://docs.atlas.mongodb.com/backup/shared-tier/overview/) for tenant clusters. If set to `false`, the cluster doesn't use backups.
                    type: boolean
                  biConnectorConfig:
                    description: Configuration settings applied to BI Connector for
                      Atlas on this cluster. The MongoDB Connector for Business Intelligence
                      for Atlas (BI Connector) is only available for M10 and larger
                      clusters. The BI Connector is a powerful tool which provides
                      users SQL-based access to their MongoDB databases. As a result,
                      the BI Connector performs operations which may be CPU and memory
                      intensive. Given the limited hardware resources on M10 and M20
                      cluster tiers, you may experience performance degradation of
                      the cluster when enabling the BI Connector. If this occurs,
                      upgrade to an M30 or larger cluster or disable the BI Connector.
                      See below.
                    properties:
                      enabled:
                        description: |-
                          Specifies whether or not BI Connector for Atlas is enabled on the cluster.
                          Flag that indicates whether MongoDB Connector for Business Intelligence is enabled on the specified cluster.
                        type: boolean
                      readPreference:
                        description: |-
                          Specifies the read preference to be used by BI Connector for Atlas on the cluster. Each BI Connector for Atlas read preference contains a distinct combination of readPreference and readPreferenceTags options. For details on BI Connector for Atlas read preferences, refer to the BI Connector Read Preferences Table.
                          Data source node designated for the MongoDB Connector for Business Intelligence on MongoDB Cloud. The MongoDB Connector for Business Intelligence on MongoDB Cloud reads data from the primary, secondary, or analytics node based on your read preferences. Defaults to `ANALYTICS` node, or `SECONDARY` if there are no `ANALYTICS` nodes.
                        type: string
                    type: object
                  clusterType:
