                  configServerManagementMode:
                    description: |-
                      Config Server Management Mode for creating or updating a sharded cluster. Valid values are ATLAS_MANAGED (default) and FIXED_TO_DEDICATED. When configured as ATLAS_MANAGED, Atlas may automatically switch the cluster's config server type for optimal performance and savings. When configured as FIXED_TO_DEDICATED, the cluster will always use a dedicated config server. To learn more, see the Sharded Cluster Config Servers documentation.
                      Config Server Management Mode for creating or updating a sharded cluster.

                      When configured as ATLAS_MANAGED, atlas may automatically switch the cluster's config server type for optimal performance and savings.

                      When configured as FIXED_TO_DEDICATED, the cluster will always use a dedicated config server.
                    type: string
                  deleteOnCreateTimeout:
                    description: |-
                      Indicates whether to delete the resource being created if a timeout is reached when waiting for completion. When set to true and timeout occurs, it triggers the deletion and returns immediately without waiting for deletion to complete. When set to false, the timeout will not trigger resource deletion. If you suspect a transient error when the value is true, wait before retrying to allow resource deletion to finish. Default is true.
                      Indicates whether to delete the resource being created if a timeout is reached when waiting for completion. When set to `true` and timeout occurs, it triggers the deletion and returns immediately without waiting for deletion to complete. When set to `false`, the timeout will not trigger resource deletion. If you suspect a transient error when the value is `true`, wait before retrying to allow resource deletion to finish. Default is `true`.
                    type: boolean
                  encryptionAtRestProvider:
                    description: |-
                      Possible values are AWS, GCP, AZURE or NONE.  Only needed if you desire to manage the keys, see Encryption at Rest using Customer Key Management for complete documentation.  You must configure encryption at rest for the Atlas project before enabling it on any cluster in the project. For Documentation, see AWS, GCP and Azure. Requirements are if replication_specs[#].region_configs[#].<type>Specs.instance_size is M10 or greater and backup_enabled is false or omitted.
                      Cloud service provider that manages your customer keys to provide an additional layer of encryption at rest for the cluster. To enable customer key management for encryption at rest, the cluster **replicationSpecs[n].regionConfigs[m].{type}Specs.instanceSize** setting must be `M10` or higher and `"backupEnabled" : false` or omitted entirely.
                    type: string
                  globalClusterSelfManagedSharding:
                    description: |-
                      Flag that indicates if cluster uses Atlas-Managed Sharding (false, default) or Self-Managed Sharding (true). It can only be enabled for Global Clusters (GEOSHARDED). It cannot be changed once the cluster is created. Use this mode if you're an advanced user and the default configuration is too restrictive for your workload. If you select this option, you must manually configure the sharding strategy, more information here.
                      Set this field to configure the Sharding Management Mode when creating a new Global Cluster.

                      When set to false, the management mode is set to Atlas-Managed Sharding. This mode fully manages the sharding of your Global Cluster and is built to provide a seamless deployment experience.

                      When set to true, the management mode is set to Self-Managed Sharding. This mode leaves the management of shards in your hands and is built to provide an advanced and flexible deployment experience.

                      This setting cannot be changed once the cluster is deployed.
                    type: boolean
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Set that contains key-value pairs between 1 to 255 characters in length for tagging and categorizing the cluster. See below. DEPRECATED Use tags instead.
                      Map of key-value pairs between 1 to 255 characters in length that tag and categorize the cluster. The MongoDB Cloud console doesn't display your labels.

                      Cluster labels are deprecated and will be removed in a future release. We strongly recommend that you use [resource tags](https://dochub.mongodb.org/core/add-cluster-tag-atlas) instead.
                    type: object
                    x-kubernetes-map-type: granular
                  mongoDbMajorVersion:
                    description: |-
                      Version of the cluster to deploy. Atlas supports all the MongoDB versions that have not reached End of Live for M10+ clusters. If omitted, Atlas deploys the cluster with the default version. For more details, see documentation. Atlas always deploys the cluster with the latest stable release of the specified version.  If you set a value to this parameter and set version_release_system CONTINUOUS, the resource returns an error. Either clear this parameter or set version_release_system: LTS.
                      MongoDB major version of the cluster.

                      On creation: Choose from the available versions of MongoDB, or leave unspecified for the current recommended default in the MongoDB Cloud platform. The recommended version is a recent Long Term Support version. The default is not guaranteed to be the most recently released version throughout the entire release cycle. For versions available in a specific project, see the linked documentation or use the API endpoint for [project LTS versions endpoint](#tag/Projects/operation/getProjectLTSVersions).

                      On update: Increase version only by 1 major version at a time. If the cluster is pinned to a MongoDB feature compatibility version exactly one major version below the current MongoDB version, the MongoDB version can be downgraded to the previous major version.
                    type: string
                  name:
                    description: |-
                      Name of the cluster as it appears in Atlas. Once the cluster is created, its name cannot be changed. WARNING Changing the name will result in destruction of the existing cluster and the creation of a new cluster.
                      Human-readable label that identifies this cluster.
                    type: string
                  paused:
                    description: |-
                      Flag that indicates whether the cluster is paused or not. You can pause M10 or larger clusters.  You cannot initiate pausing for a shared/tenant tier cluster. If you try to update a paused cluster you will get a CANNOT_UPDATE_PAUSED_CLUSTER error. See Considerations for Paused Clusters.
                      NOTE Pause lasts for up to 30 days. If you don't resume the cluster within 30 days, Atlas resumes the cluster.   If you prefer to allow the automated change of state to unpaused use:
                      lifecycle { ignore_changes = [paused] }
                      Flag that indicates whether the cluster is paused.
                    type: boolean
                  pinnedFcv:
                    description: Pins the Feature Compatibility Version (FCV) to the
                      current MongoDB version with a provided expiration date. To
                      unpin the FCV the pinned_fcv attribute must be removed. This
                      operation can take several minutes as the request processes
                      through the MongoDB data plane. Once FCV is unpinned it will
                      not be possible to downgrade the mongo_db_major_version. It
                      is advised that updates to pinned_fcv are done isolated from
                      other cluster changes. If a plan contains multiple changes,
                      the FCV change will be applied first. If FCV is unpinned past
                      the expiration date the pinned_fcv attribute must be removed.
                      The following knowledge hub article and FCV documentation can
                      be referenced for more details. See below.
                    properties:
                      expirationDate:
                        description: |-
                          Expiration date of the fixed FCV. This value is in the ISO 8601 timestamp format (e.g. "2024-12-04T16:25:00Z"). Note that this field cannot exceed 4 weeks from the pinned date.
                          Expiration date of the fixed FCV. This value is in the ISO 8601 timestamp format (e.g. 2024-12-04T16:25:00Z). Note that this field cannot exceed 4 weeks from the pinned date.
                        type: string
                    type: object
                  pitEnabled:
                    description: |-
                      Flag that indicates if the cluster uses Continuous Cloud Backup.
                      Flag that indicates whether the cluster uses continuous cloud backups.
                    type: boolean
                  projectId:
                    description: |-
                      Unique ID for the project to create the cluster, also known as groupId in the official documentation.
                      Unique 24-hexadecimal digit string that identifies your project, also known as `groupId` in the official documentation.
                    type: string
                  projectIdRef:
                    description: Reference to a Project in mongodbatlas to populate
                      projectId.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      namespace:
                        description: Namespace of the referenced object
