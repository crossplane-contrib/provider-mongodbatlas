---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: advancedclusters.mongodbatlas.mongodbatlas.crossplane.io
spec:
  group: mongodbatlas.mongodbatlas.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - mongodbatlas
    kind: AdvancedCluster
    listKind: AdvancedClusterList
    plural: advancedclusters
    singular: advancedcluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: AdvancedCluster is the Schema for the AdvancedClusters API. <no
          value>
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AdvancedClusterSpec defines the desired state of AdvancedCluster
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                properties:
                  acceptDataRisksAndForceReplicaSetReconfig:
                    description: If reconfiguration is necessary to regain a primary
                      due to a regional outage, submit this field alongside your topology
                      reconfiguration to request a new regional outage resistant topology.
                      Forced reconfigurations during an outage of the majority of
                      electable nodes carry a risk of data loss if replicated writes
                      (even majority committed writes) have not been replicated to
                      the new primary node. MongoDB Atlas docs contain more information.
                      To proceed with an operation which carries that risk, set **acceptDataRisksAndForceReplicaSetReconfig**
                      to the current date.
                    type: string
                  advancedConfiguration:
                    properties:
                      changeStreamOptionsPreAndPostImagesExpireAfterSeconds:
                        description: The minimum pre- and post-image retention time
                          in seconds.
                        type: number
                      customOpensslCipherConfigTls12:
                        description: The custom OpenSSL cipher suite list for TLS
                          1.2. This field is only valid when `tls_cipher_config_mode`
                          is set to `CUSTOM`.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                      customOpensslCipherConfigTls13:
                        description: The custom OpenSSL cipher suite list for TLS
                          1.3. This field is only valid when `tls_cipher_config_mode`
                          is set to `CUSTOM`.
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                      defaultMaxTimeMs:
                        description: Default time limit in milliseconds for individual
                          read operations to complete. This parameter is supported
                          only for MongoDB version 8.0 and above.
                        type: number
                      defaultWriteConcern:
                        description: Default level of acknowledgment requested from
                          MongoDB for write operations when none is specified by the
                          driver.
                        type: string
                      javascriptEnabled:
                        description: Flag that indicates whether the cluster allows
                          execution of operations that perform server-side executions
                          of JavaScript. When using 8.0+, we recommend disabling server-side
                          JavaScript and using operators of aggregation pipeline as
                          more performant alternative.
                        type: boolean
                      minimumEnabledTlsProtocol:
                        description: Minimum Transport Layer Security (TLS) version
                          that the cluster accepts for incoming connections. Clusters
                          using TLS 1.0 or 1.1 should consider setting TLS 1.2 as
                          the minimum TLS protocol version.
                        type: string
                      noTableScan:
                        description: Flag that indicates whether the cluster disables
                          executing any query that requires a collection scan to return
                          results.
                        type: boolean
                      oplogMinRetentionHours:
                        description: Minimum retention window for cluster's oplog
                          expressed in hours. A value of null indicates that the cluster
                          uses the default minimum oplog window that MongoDB Cloud
                          calculates.
                        type: number
                      oplogSizeMb:
                        description: Storage limit of cluster's oplog expressed in
                          megabytes. A value of null indicates that the cluster uses
                          the default oplog size that MongoDB Cloud calculates.
                        type: number
                      sampleRefreshIntervalBiConnector:
                        description: Interval in seconds at which the mongosqld process
                          re-samples data to create its relational schema.
                        type: number
                      sampleSizeBiConnector:
                        description: Number of documents per database to sample when
                          gathering schema information.
                        type: number
                      tlsCipherConfigMode:
                        description: The TLS cipher suite configuration mode. Valid
                          values include `CUSTOM` or `DEFAULT`. The `DEFAULT` mode
                          uses the default cipher suites. The `CUSTOM` mode allows
                          you to specify custom cipher suites for both TLS 1.2 and
                          TLS 1.3. To unset, this should be set back to `DEFAULT`.
                        type: string
                      transactionLifetimeLimitSeconds:
                        description: Lifetime, in seconds, of multi-document transactions.
                          Atlas considers the transactions that exceed this limit
                          as expired and so aborts them through a periodic cleanup
                          process.
                        type: number
                    type: object
                  backupEnabled:
                    description: Flag that indicates whether the cluster can perform
                      backups. If set to `true`, the cluster can perform backups.
                      You must set this value to `true` for NVMe clusters. Backup
                      uses [Cloud Backups](https://docs.atlas.mongodb.com/backup/cloud-backup/overview/)
                      for dedicated clusters and [Shared Cluster Backups](https://docs.atlas.mongodb.com/backup/shared-tier/overview/)
                      for tenant clusters. If set to `false`, the cluster doesn't
                      use backups.
                    type: boolean
                  biConnectorConfig:
                    properties:
                      enabled:
                        description: Flag that indicates whether MongoDB Connector
                          for Business Intelligence is enabled on the specified cluster.
                        type: boolean
                      readPreference:
                        description: Data source node designated for the MongoDB Connector
                          for Business Intelligence on MongoDB Cloud. The MongoDB
                          Connector for Business Intelligence on MongoDB Cloud reads
                          data from the primary, secondary, or analytics node based
                          on your read preferences. Defaults to `ANALYTICS` node,
                          or `SECONDARY` if there are no `ANALYTICS` nodes.
                        type: string
                    type: object
                  clusterType:
                    description: Configuration of nodes that comprise the cluster.
                    type: string
                  configServerManagementMode:
                    description: |-
                      Config Server Management Mode for creating or updating a sharded cluster.

                      When configured as ATLAS_MANAGED, atlas may automatically switch the cluster's config server type for optimal performance and savings.

                      When configured as FIXED_TO_DEDICATED, the cluster will always use a dedicated config server.
                    type: string
                  deleteOnCreateTimeout:
                    description: Indicates whether to delete the resource being created
                      if a timeout is reached when waiting for completion. When set
                      to `true` and timeout occurs, it triggers the deletion and returns
                      immediately without waiting for deletion to complete. When set
                      to `false`, the timeout will not trigger resource deletion.
                      If you suspect a transient error when the value is `true`, wait
                      before retrying to allow resource deletion to finish. Default
                      is `true`.
                    type: boolean
                  encryptionAtRestProvider:
                    description: 'Cloud service provider that manages your customer
                      keys to provide an additional layer of encryption at rest for
                      the cluster. To enable customer key management for encryption
                      at rest, the cluster **replicationSpecs[n].regionConfigs[m].{type}Specs.instanceSize**
                      setting must be `M10` or higher and `"backupEnabled" : false`
                      or omitted entirely.'
                    type: string
                  globalClusterSelfManagedSharding:
                    description: |-
                      Set this field to configure the Sharding Management Mode when creating a new Global Cluster.

                      When set to false, the management mode is set to Atlas-Managed Sharding. This mode fully manages the sharding of your Global Cluster and is built to provide a seamless deployment experience.

                      When set to true, the management mode is set to Self-Managed Sharding. This mode leaves the management of shards in your hands and is built to provide an advanced and flexible deployment experience.

                      This setting cannot be changed once the cluster is deployed.
                    type: boolean
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      Map of key-value pairs between 1 to 255 characters in length that tag and categorize the cluster. The MongoDB Cloud console doesn't display your labels.

                      Cluster labels are deprecated and will be removed in a future release. We strongly recommend that you use [resource tags](https://dochub.mongodb.org/core/add-cluster-tag-atlas) instead.
                    type: object
                    x-kubernetes-map-type: granular
                  mongoDbMajorVersion:
                    description: |-
                      MongoDB major version of the cluster.

                      On creation: Choose from the available versions of MongoDB, or leave unspecified for the current recommended default in the MongoDB Cloud platform. The recommended version is a recent Long Term Support version. The default is not guaranteed to be the most recently released version throughout the entire release cycle. For versions available in a specific project, see the linked documentation or use the API endpoint for [project LTS versions endpoint](#tag/Projects/operation/getProjectLTSVersions).

                      On update: Increase version only by 1 major version at a time. If the cluster is pinned to a MongoDB feature compatibility version exactly one major version below the current MongoDB version, the MongoDB version can be downgraded to the previous major version.
                    type: string
                  name:
                    description: Human-readable label that identifies this cluster.
                    type: string
                  paused:
                    description: Flag that indicates whether the cluster is paused.
                    type: boolean
                  pinnedFcv:
                    properties:
                      expirationDate:
                        description: Expiration date of the fixed FCV. This value
                          is in the ISO 8601 timestamp format (e.g. 2024-12-04T16:25:00Z).
                          Note that this field cannot exceed 4 weeks from the pinned
                          date.
                        type: string
                    type: object
                  pitEnabled:
                    description: Flag that indicates whether the cluster uses continuous
                      cloud backups.
                    type: boolean
                  projectId:
                    description: |-
                      Unique 24-hexadecimal digit string that identifies your project. Use the [/groups](#tag/Projects/operation/listProjects) endpoint to retrieve all projects to which the authenticated user has access.

                      **NOTE**: Groups and projects are synonymous terms. Your group id is the same as your project id. For existing groups, your group/project id remains the same. The resource and corresponding endpoints use the term groups.
                    type: string
                  projectIdRef:
                    description: Reference to a Project in mongodbatlas to populate
                      projectId.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  projectIdSelector:
                    description: Selector for a Project in mongodbatlas to populate
